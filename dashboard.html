/* HEADER */
.dash-header{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(20px,5vh,44px) 20px clamp(4px,1vh,10px);
  flex-shrink:0;
}
.dash-logo{display:flex;align-items:center;gap:8px;}
.dash-logo-icon{font-size:clamp(18px,4vw,24px);}
.dash-logo-text{font-family:'Fredoka One',cursive;font-size:clamp(16px,4vw,22px);line-height:1.1;}
.dash-logo-text .r{color:#4fc3f7;}
.dash-logo-text .d{color:#FFD700;}
.dash-avatar{
  width:clamp(32px,8vw,40px);height:clamp(32px,8vw,40px);
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(14px,3.5vw,18px);cursor:pointer;
}

/* BODY */
.dash-body{
  position:relative;z-index:2;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
  padding:0 20px clamp(12px,3vh,24px);
  min-height:0;
}

/* STATS */
.stat-block{
  text-align:center;
  padding:clamp(4px,1vh,8px) 0;
  border-bottom:1px solid rgba(255,215,0,0.12);
}
.stat-block:last-of-type{border-bottom:none;}
.stat-label{
  font-size:clamp(8px,2vw,10px);font-weight:800;
  color:rgba(255,255,255,0.5);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:1px;
}
.stat-value{
  font-family:'Fredoka One',cursive;
  font-size:clamp(24px,6vw,36px);
  color:#FFD700;line-height:1.1;
  text-shadow:0 0 20px rgba(255,200,0,0.4);
}
.stat-sub{
  font-size:clamp(10px,2.5vw,12px);
  color:rgba(255,255,255,0.4);font-weight:700;
}

/* BOTTOM ACTIONS */
.actions{
  display:flex;flex-direction:column;gap:8px;
  flex-shrink:0;
}
.amount-wrap{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,215,0,0.35);
  border-radius:14px;
  padding:clamp(8px,2vh,12px) 14px;
}
.amount-wrap input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:'Fredoka One',cursive;
  font-size:clamp(16px,4vw,20px);color:#FFD700;
  min-width:0;
}
.amount-wrap input::placeholder{color:rgba(255,215,0,0.35);}
.amount-wrap span{color:rgba(255,255,255,0.6);font-size:clamp(11px,2.5vw,14px);font-weight:700;white-space:nowrap;}
.stake-btn{
  width:100%;
  padding:clamp(10px,2.5vh,14px);
  border:none;border-radius:50px;
  background:linear-gradient(135deg,#1d6fe8,#38bdf8);
  color:#fff;font-family:'Fredoka One',cursive;
  font-size:clamp(15px,4vw,18px);
  cursor:pointer;
  box-shadow:0 4px 20px rgba(29,111,232,0.4);
  transition:transform 0.2s;
}
.stake-btn:active{transform:scale(0.98);}
.unstake-btn{
  width:100%;
  padding:clamp(8px,2vh,11px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:50px;background:transparent;
  color:rgba(255,255,255,0.6);
  font-family:'Fredoka One',cursive;
  font-size:clamp(13px,3.5vw,16px);
  cursor:pointer;
}
</style>
</head>
<body>
<div class="page">
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <div class="dash-header">
    <div class="dash-logo">
      <span class="dash-logo-icon">💧</span>
      <div class="dash-logo-text">
        <div class="r">Ripple</div>
        <div class="d">Dripple</div>
      </div>
    </div>
    <div class="dash-avatar">👤</div>
  </div>

  <div class="dash-body">

    <div class="stat-block">
      <div class="stat-label">💰 XRP Balance</div>
      <div class="stat-value" id="xrp-bal">— XRP</div>
      <div class="stat-sub" id="xrp-usd">≈ $0.00 USD</div>
    </div>

    <div class="stat-block">
      <div class="stat-label">📈 Live Reward Rate</div>
      <div class="stat-value">15%</div>
    </div>

    <div class="stat-block">
      <div class="stat-label">💧 Today's Drip</div>
      <div class="stat-value" id="earn">+0.0000 XRP</div>
      <div class="stat-sub" id="earn-usd">≈ $0.0000 USD</div>
    </div>

    <div class="actions">
      <div class="amount-wrap">
        <input type="number" id="stake-amount" placeholder="Enter XRP Amount" min="1" step="1">
        <span>XRP</span>
      </div>
      <button class="stake-btn" onclick="doStake()">➕ Add XRP</button>
      <button class="unstake-btn" onclick="doUnstake()">🔓 Unstake & Withdraw</button>
    </div>

  </div>
</div>

<script>
const API = 'https://api.rippledripple.campioneinfrastructure.com';
const XRP_PRICE = 0.52;
let drip = 0;
const userAccount = localStorage.getItem('xrp_address');
if(userAccount) loadBalance(userAccount);

async function loadBalance(address) {
  try {
    const res = await fetch(API+'/api/balance/'+address);
    const data = await res.json();
    if(data.success){
      const xrp = parseFloat(data.xrp);
      document.getElementById('xrp-bal').textContent = xrp.toLocaleString()+' XRP';
      document.getElementById('xrp-usd').textContent = '≈ $'+(xrp*XRP_PRICE).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+' USD';
    }
  } catch(e) {}
}

async function doStake() {
  const amount = parseFloat(document.getElementById('stake-amount').value);
  if(!amount || amount < 1) { alert('Please enter at least 1 XRP'); return; }
  if(!userAccount) { alert('Please connect your Xaman wallet first!'); return; }
  try {
    const res = await fetch(API+'/api/amm/deposit', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({account:userAccount, amountXRP:amount})
    });
    const data = await res.json();
    if(data.success) window.location.href = data.deeplink;
  } catch(e) { alert('Error creating stake transaction'); }
}

function doUnstake() { alert('Unstake feature coming soon!'); }

setInterval(() => {
  drip += 0.000041;
  document.getElementById('earn').textContent = '+'+drip.toFixed(4)+' XRP';
  document.getElementById('earn-usd').textContent = '≈ $'+(drip*XRP_PRICE).toFixed(4)+' USD';
}, 1000);
</script>
</body>
</html>
